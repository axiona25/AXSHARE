# AXSHARE — Stack locale (Fase 1.2)
# docker compose up -d
# Verifica: docker compose ps (tutti healthy/Up)
# Vault init (prima volta): docker exec axshare_vault sh /vault/config/init.sh

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: axshare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: axshare
      POSTGRES_PASSWORD: axshare_password
      POSTGRES_DB: axshare_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axshare -d axshare_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - axshare_net

  redis:
    image: redis:7-alpine
    container_name: axshare_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass axshare_redis_password
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "axshare_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - axshare_net

  minio:
    # Pin to image that includes curl for healthcheck (newer ubi-micro images do not)
    image: minio/minio:RELEASE.2023-10-25T06-33-25Z
    container_name: axshare_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: axshare_minio
      MINIO_ROOT_PASSWORD: axshare_minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - axshare_net

  minio_init:
    image: minio/mc:latest
    container_name: axshare_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 axshare_minio axshare_minio_secret;
      mc mb --ignore-existing local/axshare-files;
      mc mb --ignore-existing local/axshare-keys;
      mc anonymous set none local/axshare-files;
      mc anonymous set none local/axshare-keys;
      echo 'MinIO buckets ready';
      "
    networks:
      - axshare_net

  vault:
    image: hashicorp/vault:1.17
    container_name: axshare_vault
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: axshare-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - axshare_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: axshare_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://axshare:axshare_password@postgres:5432/axshare_db
      REDIS_URL: redis://:axshare_redis_password@redis:6379/0
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: axshare_minio
      MINIO_SECRET_KEY: axshare_minio_secret
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: axshare-dev-token
      SECRET_KEY: axshare_secret_key_change_in_production
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - axshare_net
    volumes:
      - ./backend:/app

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://axshare:axshare_password@postgres:5432/axshare_db
      REDIS_URL: redis://:axshare_redis_password@redis:6379/0
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: axshare_minio
      MINIO_SECRET_KEY: axshare_minio_secret
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - axshare_net

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://axshare:axshare_password@postgres:5432/axshare_db
      REDIS_URL: redis://:axshare_redis_password@redis:6379/0
    depends_on:
      - celery_worker
    restart: unless-stopped
    networks:
      - axshare_net

  adminer:
    image: adminer:latest
    container_name: axshare_adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - axshare_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  vault_data:

networks:
  axshare_net:
    driver: bridge
    name: axshare_network
