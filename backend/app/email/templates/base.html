<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}AXSHARE{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff;
                 border-radius: 8px; padding: 32px; }
    .header { border-bottom: 2px solid #1a1a2e; padding-bottom: 16px; margin-bottom: 24px; }
    .header h1 { margin: 0; font-size: 24px; color: #1a1a2e; }
    .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #eee;
              font-size: 12px; color: #999; }
    .btn { display: inline-block; padding: 12px 24px; background: #1a1a2e;
           color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; }
    .alert { background: #fff3cd; border: 1px solid #ffc107;
             border-radius: 4px; padding: 12px; margin: 16px 0; }
    .danger { background: #f8d7da; border-color: #f5c6cb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔒 AXSHARE</h1>
    </div>
    {% block content %}{% endblock %}
    <div class="footer">
      <p>AXSHARE — Condivisione file cifrata end-to-end.</p>
      {% if unsubscribe_url %}
      <p>
        Per non ricevere più email di questo tipo:
        <a href="{{ unsubscribe_url }}">Annulla iscrizione</a>
      </p>
      {% endif %}
      <p>© {{ year }} AXSHARE. Tutti i diritti riservati.</p>
    </div>
  </div>
</body>
</html>
