# Alertmanager — sostituire le email con le tue o usare envsubst con .env.prod
# Es: envsubst < alertmanager.yml.tpl > alertmanager.yml

global:
  smtp_from: "alertmanager@axshare.io"
  smtp_smarthost: "localhost:587"
  smtp_require_tls: true
  # smtp_auth_username / smtp_auth_password da impostare se SMTP richiede auth

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "email-critical"

  routes:
    - match:
        severity: critical
      receiver: "email-critical"
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "email-warning"
      group_wait: 5m
      repeat_interval: 8h

    - match:
        alertname: BruteForceDetected
      receiver: "security-critical"
      repeat_interval: 30m

receivers:
  - name: "email-critical"
    email_configs:
      - to: "admin@axshare.io"
        send_resolved: true
        headers:
          Subject: "[AXSHARE CRITICAL] {{ .GroupLabels.alertname }}"
        text: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Descrizione: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Iniziato: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  - name: "email-warning"
    email_configs:
      - to: "admin@axshare.io"
        send_resolved: true
        headers:
          Subject: "[AXSHARE WARNING] {{ .GroupLabels.alertname }}"

  - name: "security-critical"
    email_configs:
      - to: "security@axshare.io"
        send_resolved: false
        headers:
          Subject: "[AXSHARE SECURITY] {{ .Annotations.summary }}"

inhibit_rules:
  - source_match:
      alertname: BackendDown
    target_match_re:
      alertname: "HighErrorRate|HighLatency|EncryptionFailures"
    equal: ["job"]
