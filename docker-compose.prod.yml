# AXSHARE — Production stack
# Uso: cp .env.prod.example .env.prod && edit .env.prod
#       docker compose -f docker-compose.prod.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      APP_ENV: production
    volumes:
      - backend_keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  vault:
    image: hashicorp/vault:1.17
    cap_add: [IPC_LOCK]
    volumes:
      - vault_data:/vault/data
      - ./infra/vault/policies:/vault/policies:ro
      - ./infra/vault/server-config.json:/local:ro
    command: vault server -config=/local
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      retries: 5

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - celery_worker
    restart: unless-stopped
    logging: *default-logging

  pg_backup:
    image: postgres:16-alpine
    container_name: axshare_pg_backup
    volumes:
      - ./infra/scripts/pg_backup.sh:/pg_backup.sh:ro
      - ./infra/scripts/test_backup_integrity.sh:/test_backup_integrity.sh:ro
      - backups:/backups
      - backup_gnupg:/root/.gnupg:ro
    env_file: .env.prod
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      ALERT_EMAIL_CRITICAL: ${ALERT_EMAIL_CRITICAL:-admin@axshare.io}
    command: >
      sh -c "
        apk add --no-cache bash gpg gzip findutils coreutils 2>/dev/null || true;
        chmod +x /pg_backup.sh /test_backup_integrity.sh;
        echo '0 1 * * * /pg_backup.sh >> /backups/cron.log 2>&1' > /etc/crontabs/root;
        echo '0 4 * * 0 /test_backup_integrity.sh >> /backups/integrity.log 2>&1' >> /etc/crontabs/root;
        crond -f -l 2
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - backup

  # ── Prometheus (metriche) ────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: axshare_prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: unless-stopped
    logging: *default-logging

  # ── Grafana ──────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: axshare_grafana
    env_file: .env.prod
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3030}
      GF_SMTP_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    logging: *default-logging

  # ── Alertmanager ──────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: axshare_alertmanager
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    ports:
      - "9093:9093"
    restart: unless-stopped
    logging: *default-logging

  # ── Loki ─────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: axshare_loki
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    restart: unless-stopped
    logging: *default-logging

  # ── Promtail (raccoglie log da container) ────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: axshare_promtail
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    logging: *default-logging

  # Exporters per Prometheus (metriche sistema, postgres, redis)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: axshare_node_exporter
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    ports:
      - "9100:9100"
    restart: unless-stopped
    logging: *default-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: axshare_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: axshare_redis_exporter
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  minio_data:
  vault_data:
  nginx_cache:
  backend_keys:
  backups:
  backup_gnupg:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:
