name: Desktop Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Run Rust tests
        working-directory: desktop/src-tauri
        run: cargo test

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build Mac (Universal)
        working-directory: desktop
        run: cargo tauri build --target universal-apple-darwin
        env:
          TAURI_ENV: production
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: axshare-mac-dmg
          path: desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build Windows
        working-directory: desktop
        run: cargo tauri build
        env:
          TAURI_ENV: production
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: axshare-windows-installer
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
